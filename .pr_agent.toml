[pr_reviewer]
extra_instructions="""\
Android-Specific Best Practices:
   - Architecture & Patterns: Verify adherence to Clean Architecture (MVVM/MVI). Ensure ViewModels do not hold references to Views or Contexts. UI logic must remain in the UI layer, never in repositories or data sources.
   - State Management: Confirm StateFlow/LiveData is private (Mutable) and exposed as immutable types. Use SavedStateHandle in ViewModels to handle process death and onSaveInstanceState for transient UI state.
   - Jetpack Compose: Ensure components are stateless where possible, with state hoisted. Flag side effects not wrapped in the correct LaunchedEffect, SideEffect, or DisposableEffect APIs. Verify collectAsStateWithLifecycle is used for flow collection.
   - Dependency Injection (DI): Validate that Hilt or Koin is set up correctly. Flag manual instantiation of classes that should be injected, missing @Inject annotations, or incorrect scoping (e.g., @Singleton vs @ViewModelScoped).
   - Memory & Lifecycle: Flag anonymous inner classes, non-static Handlers, or callbacks holding implicit references to Activities/Fragments. Ensure proper cleanup in onCleared (ViewModel) or onDestroy (UI).
   - Coroutines & Flow: Mandate viewModelScope or lifecycleScope (forbid GlobalScope). Ensure Dispatchers.Main is never used for blocking I/O (Room, Disk, Network). Use lifecycle-aware collectors like repeatOnLifecycle.
   - Data Persistence (Room): Verify entities have proper primary keys and indices. DAOs must use suspend functions or return Flow. Ensure migrations are implemented and R8/ProGuard @Keep rules are applied to serialized models.
   - Security & Privacy: Forbid logging or hard-coding PII, tokens, or passwords. Use EncryptedSharedPreferences or Keystore. Validate that Intents do not expose sensitive data and exported components are protected.
   - Permissions & Manifest: Ensure runtime permission requests (Android 6+) are handled gracefully. Validate that all Manifest permissions are strictly necessary and that targetSdk/compileSdk are up to date.
   - UI & Resources: Forbid hard-coded strings (use strings.xml). Support RTL, plurals, and formatting args. Ensure image loading (Coil/Glide) uses lifecycle-aware contexts and appropriate downsampling/placeholders.
   - List Performance: In RecyclerViews, mandate ListAdapter or DiffUtil over notifyDataSetChanged(). Ensure click listeners are set in onCreateViewHolder, not onBindViewHolder, to avoid performance hits and leaks.
   - Testing Excellence: Require unit tests for ViewModels, Repositories, and Use Cases (MockK/JUnit) asserting on state/output rather than implementation details. Ensure critical flows have UI tests (Espresso/Compose).
   - Background Work: Review WorkManager usage; verify Workers are idempotent with correct constraints (network/battery) and BackoffPolicy. Suggest modern equivalents for deprecated APIs like AsyncTask.
   - Modern API Usage: Flag deprecated APIs (e.g., startActivityForResult, legacy SupportFragmentManager). Suggest ActivityResultContracts, FragmentResultListener, and modern Jetpack libraries.
   - Build & Configuration: Review Gradle for dependency version pinning and implementation vs api scoping. Ensure buildConfig does not leak secrets and version-specific code is guarded by SDK_INT checks.
   - Deep Links & Input: Sanitize and validate all external inputs (Deep links, Push notification payloads) before use to prevent injection attacks or unexpected navigation.
"""
enable_review_labels_effort = true
enable_auto_approval = true

[github_app]
pr_commands = [
    "/describe --pr_description.publish_description_as_comment=true",
    "/improve",
    "/agentic_review"
]

handle_push_trigger = true
push_commands = [
    "/improve",
    "/agentic_review"
]

[review_agent]
enabled = true
publish_output = true
